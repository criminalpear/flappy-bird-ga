<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird - GA Trainer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #eee; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 10px; }
h1 { font-size: 16px; margin-bottom: 6px; color: #f0e68c; }
#layout { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
canvas { border: 2px solid #444; border-radius: 4px; }
#panel { width: 260px; font-size: 11px; }
#panel h3 { color: #7fff7f; margin: 6px 0 3px; font-size: 12px; }
#stats { background: #16213e; padding: 6px; border-radius: 4px; line-height: 1.5; }
#stats span { color: #ffd700; }
#controls { display: flex; flex-wrap: wrap; gap: 3px; margin: 6px 0; }
button { background: #0f3460; color: #eee; border: 1px solid #444; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; }
button:hover { background: #1a5276; }
button.active { background: #27ae60; }
#fitnessGraph { background: #16213e; border-radius: 4px; margin-top: 4px; }
#log { background: #0d1117; padding: 4px; border-radius: 4px; margin-top: 4px; max-height: 100px; overflow-y: auto; font-size: 9px; color: #888; }
#log .good { color: #7fff7f; }
#log .info { color: #7fbfff; }
</style>
</head>
<body>
<h1>🐦 Flappy Bird GA Trainer</h1>
<div id="layout">
  <canvas id="gc" width="400" height="600"></canvas>
  <div id="panel">
    <div id="controls">
      <button id="btnStart" onclick="toggleTraining()">▶ Start</button>
      <button id="btnSpeed" onclick="cycleSpeed()">1x</button>
      <button onclick="saveBestBrain()">💾 Save</button>
      <button onclick="resetTraining()">🔄 Reset</button>
    </div>
    <h3>📊 Stats</h3>
    <div id="stats">
      Gen: <span id="gen">0</span> | Alive: <span id="alive">0</span>/<span id="pop">0</span><br>
      Best Score: <span id="bestScore">0</span> | Avg: <span id="avgScore">0</span><br>
      Difficulty: <span id="diff">1</span> | Mut: <span id="mut">20%</span>
    </div>
    <h3>📈 Best Score</h3>
    <canvas id="fg" width="260" height="80"></canvas>
    <h3>📜 Log</h3>
    <div id="log"></div>
  </div>
</div>
<script>
// ══════════════════════════════════════════════
//  TINY NET: 4→3→1 (19 weights) — small = evolvable
// ══════════════════════════════════════════════
class Net {
  constructor(src) {
    this.w = src ? src.slice() : [];
    if (!src) {
      // 4*3 + 3*1 + 3 + 1 = 19 weights
      for (let i = 0; i < 19; i++) this.w.push((Math.random() - 0.5) * 2);
    }
  }
  forward(inp) {
    // Hidden: 4 inputs -> 3 hidden
    const h = [0,0,0];
    for (let i = 0; i < 3; i++) {
      let s = this.w[12 + i]; // bias
      for (let j = 0; j < 4; j++) s += inp[j] * this.w[i*4 + j];
      h[i] = Math.max(0, s);
    }
    // Output: 3 hidden -> 1
    let o = this.w[18]; // bias
    for (let i = 0; i < 3; i++) o += h[i] * this.w[15 + i];
    return 1 / (1 + Math.exp(-Math.max(-15, Math.min(15, o))));
  }
  clone() { return new Net(this.w.slice()); }
  mutate(rate, str) {
    const w = this.w.slice();
    for (let i = 0; i < w.length; i++) {
      if (Math.random() < rate) w[i] += (Math.random() - 0.5) * 2 * str;
    }
    return new Net(w);
  }
  static crossover(a, b) {
    const w = [];
    for (let i = 0; i < 19; i++) w.push(Math.random() < 0.5 ? a.w[i] : b.w[i]);
    return new Net(w);
  }
}

// ══════════════════════════════════════════════
//  GAME
// ══════════════════════════════════════════════
const CW=400, CH=600, GY=CH-30;
const GRAV=0.32, FLAP=-5.8;
const PW=50, PX=70, PR=12;

class Pipe {
  constructor(x, gapC, gapS) {
    this.x = x; this.gapC = gapC; this.gapS = gapS; this.passed = false;
  }
  update() { this.x -= this._speed; }
  draw(c) {
    const gt = this.gapC - this.gapS/2, gb = this.gapC + this.gapS/2;
    c.fillStyle='#27ae60';
    c.fillRect(this.x, 0, PW, gt);
    c.fillRect(this.x, gb, PW, CH-gb);
    c.fillStyle='#1e8449';
    c.fillRect(this.x-3, gt-16, PW+6, 16);
    c.fillRect(this.x-3, gb, PW+6, 16);
  }
  hits(b) {
    const m=3;
    if (PX+m < this.x+PW && PX+PR*2-m > this.x) {
      if (b.y+m < this.gapC-this.gapS/2 || b.y+PR*2-m > this.gapC+this.gapS/2) return true;
    }
    return false;
  }
}

class Bird {
  constructor(brain) {
    this.y = CH*0.3; this.vel = FLAP*0.6;
    this.alive = true; this.score = 0; this.fitness = 0; this.frames = 0;
    this.brain = brain || new Net();
  }
  think(pipe) {
    if (!pipe) { if (this.brain.forward([this.y/CH, this.vel/8, 0.5, 0.5])[0] > 0.5) this.flap(); return; }
    const inp = [
      this.y / CH,
      this.vel / 8,
      (pipe.x - PX) / CW,
      pipe.gapC / CH
    ];
    if (this.brain.forward(inp)[0] > 0.5) this.flap();
  }
  flap() { this.vel = FLAP; }
  update(pipes) {
    if (!this.alive) return;
    this.frames++;
    this.vel += GRAV; this.y += this.vel;
    if (this.y < 0) { this.y=0; this.die(); return; }
    if (this.y+PR*2 > GY) { this.die(); return; }
    for (let p of pipes) { if (p.hits(this)) { this.die(); return; } }
    for (let p of pipes) {
      if (!p.passed && p.x+PW < PX) { p.passed=true; this.score++; this.fitness+=500; }
    }
    this.fitness += 1;
    // Centering reward
    let next = null;
    for (let p of pipes) { if (p.x+PW > PX) { next=p; break; } }
    if (next) {
      const d = Math.abs(this.y+PR - next.gapC);
      this.fitness += Math.max(0, 2 - d/next.gapS);
    }
  }
  die() { this.alive=false; this.fitness=Math.max(this.fitness,1); }
  draw(c) {
    if (!this.alive) return;
    c.save(); c.translate(PX+PR, this.y+PR);
    c.rotate(Math.max(-0.4, Math.min(0.7, this.vel*0.06)));
    c.fillStyle='#f0e68c'; c.beginPath(); c.ellipse(0,0,PR,PR*0.85,0,0,Math.PI*2); c.fill();
    c.fillStyle='#fff'; c.beginPath(); c.arc(3,-3,3,0,Math.PI*2); c.fill();
    c.fillStyle='#000'; c.beginPath(); c.arc(4,-3,1.5,0,Math.PI*2); c.fill();
    c.fillStyle='#ff6b35'; c.beginPath(); c.moveTo(7,0); c.lineTo(13,2); c.lineTo(7,4); c.closePath(); c.fill();
    c.restore();
  }
}

// ══════════════════════════════════════════════
//  GA WITH CURRICULUM LEARNING
// ══════════════════════════════════════════════
const POP = 30;
let birds=[], pipes=[], fc=0;
let gen=0, bestScore=0, bestBrain=null;
let scoreHist=[], training=false, speed=1;
let speeds=[1,10,50,100,200,500], si=0;
let mutRate=0.3, mutStr=0.4;

// Curriculum: start easy, get harder as score improves
let difficulty = 1; // 1=easy, 10=hard
const GAP_SIZES = [200, 190, 180, 170, 160, 150, 140, 135, 130, 125];
const PIPE_SPEEDS = [1.5, 1.7, 1.9, 2.0, 2.1, 2.2, 2.3, 2.4, 2.5, 2.5];
const SPAWN_INTERVALS = [120, 115, 110, 105, 100, 95, 92, 90, 88, 85];

function getGapSize() { return GAP_SIZES[Math.min(difficulty-1, GAP_SIZES.length-1)]; }
function getPipeSpeed() { return PIPE_SPEEDS[Math.min(difficulty-1, PIPE_SPEEDS.length-1)]; }
function getSpawnInt() { return SPAWN_INTERVALS[Math.min(difficulty-1, SPAWN_INTERVALS.length-1)]; }

const ctx = document.getElementById('gc').getContext('2d');
const gctx = document.getElementById('fg').getContext('2d');

function init() {
  birds=[]; for (let i=0;i<POP;i++) birds.push(new Bird());
  pipes=[]; fc=0; gen=0; bestScore=0; bestBrain=null;
  scoreHist=[]; difficulty=1; mutRate=0.3; mutStr=0.4;
  log('Ready! Press ▶ Start','info');
}

function updateDifficulty() {
  // Increase difficulty every time best score crosses a threshold
  const newDiff = Math.min(10, Math.floor(bestScore / 3) + 1);
  if (newDiff > difficulty) {
    difficulty = newDiff;
    log('Difficulty → ' + difficulty + ' (gap=' + getGapSize() + ')', 'info');
  }
}

function nextGeneration() {
  gen++;
  for (let b of birds) if (b.alive) b.fitness = Math.max(b.fitness, 1);
  birds.sort((a,b) => b.fitness - a.fitness);

  const top = birds[0];
  const avgScore = birds.reduce((s,b)=>s+b.score,0)/POP;

  if (top.score > bestScore) {
    bestScore = top.score;
    bestBrain = top.brain.clone();
    updateDifficulty();
    log('G'+gen+': score='+bestScore+' frames='+top.frames+' diff='+difficulty,'good');
  }

  scoreHist.push({gen:gen, score:bestScore});
  if (scoreHist.length > 300) scoreHist.shift();

  // Adaptive mutation
  if (gen > 3) {
    const r = scoreHist.slice(-5);
    if (r[r.length-1].score > r[0].score) {
      mutStr = Math.max(0.05, mutStr * 0.88);
      mutRate = Math.max(0.1, mutRate * 0.92);
    } else {
      mutStr = Math.min(1.0, mutStr * 1.2);
      mutRate = Math.min(0.6, mutRate * 1.1);
    }
  }

  // ═══ SELECTION: Tournament k=3 + Elitism ═══
  const newBirds = [];
  // Keep top 3 unchanged
  for (let i = 0; i < 3; i++) newBirds.push(new Bird(birds[i].brain.clone()));

  // If we have a global best, keep it too
  if (bestBrain) newBirds.push(new Bird(bestBrain.clone()));

  // Tournament selection for the rest
  function tournament() {
    let best = birds[Math.floor(Math.random()*POP)];
    for (let i = 0; i < 2; i++) {
      const c = birds[Math.floor(Math.random()*POP)];
      if (c.fitness > best.fitness) best = c;
    }
    return best;
  }

  while (newBirds.length < POP) {
    const a = tournament();
    let b = tournament();
    let t=0; while(b===a && t++<5) b=tournament();
    let child;
    if (Math.random() < 0.7) {
      child = Net.crossover(a.brain, b.brain);
    } else {
      child = a.brain.clone();
    }
    child = child.mutate(mutRate, mutStr);
    newBirds.push(new Bird(child));
  }

  birds = newBirds;
  pipes = [];
  fc = 0;
  updateStats();
  drawGraph();
}

function gameLoop() {
  // Background
  const sky = ctx.createLinearGradient(0,0,0,CH);
  sky.addColorStop(0,'#4dc9f6'); sky.addColorStop(1,'#87ceeb');
  ctx.fillStyle=sky; ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#8B4513'; ctx.fillRect(0,GY,CW,30);
  ctx.fillStyle='#228B22'; ctx.fillRect(0,GY-5,CW,8);

  if (!training) {
    for (let b of birds) { ctx.globalAlpha=0.5; b.draw(ctx); ctx.globalAlpha=1; }
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,CW,24);
    ctx.fillStyle='#fff'; ctx.font='11px monospace';
    ctx.fillText('Press ▶ Start', 8, 16);
    requestAnimationFrame(gameLoop);
    return;
  }

  for (let s=0; s<speed; s++) {
    fc++;
    const gapSize = getGapSize();
    const pipeSpeed = getPipeSpeed();
    const spawnInt = getSpawnInt();

    // Spawn pipes
    if (fc === 1) {
      // First pipe: close to bird, gap centered on bird's starting position
      pipes.push(new Pipe(CW*0.25, CH*0.3+PR, gapSize));
      pipes[0]._speed = pipeSpeed;
    } else if ((fc-1) % spawnInt === 0) {
      const gapY = 70 + Math.random() * (CH - gapSize - 140);
      const p = new Pipe(CW+10, gapY, gapSize);
      p._speed = pipeSpeed;
      pipes.push(p);
    }

    for (let p of pipes) p.update();
    pipes = pipes.filter(p => p.x+PW > -10);

    // Find next pipe for each bird
    let alive = 0;
    for (let b of birds) {
      if (b.alive) {
        let next = null;
        for (let p of pipes) { if (p.x+PW > PX) { next=p; break; } }
        b.think(next);
        b.update(pipes);
        if (b.alive) alive++;
      }
    }
    if (alive === 0) nextGeneration();
  }

  // Render
  for (let p of pipes) p.draw(ctx);
  for (let b of birds) b.draw(ctx);

  const best = birds.find(b=>b.alive);
  if (best) { ctx.strokeStyle='#ffd700'; ctx.lineWidth=2; ctx.strokeRect(PX-2,best.y-2,PR*2+4,PR*2+4); }

  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,CW,24);
  ctx.fillStyle='#fff'; ctx.font='11px monospace';
  ctx.fillText('G:'+gen+' A:'+birds.filter(b=>b.alive).length+'/'+POP+' Best:'+bestScore+' D:'+difficulty, 8, 16);
  updateStats();
  requestAnimationFrame(gameLoop);
}

function toggleTraining() {
  training = !training;
  document.getElementById('btnStart').textContent = training ? '⏸ Pause' : '▶ Start';
  document.getElementById('btnStart').classList.toggle('active', training);
  if (!birds.length) init();
}

function cycleSpeed() {
  si = (si+1) % speeds.length;
  speed = speeds[si];
  document.getElementById('btnSpeed').textContent = speed + 'x';
}

function resetTraining() {
  training = false;
  document.getElementById('btnStart').textContent = '▶ Start';
  document.getElementById('btnStart').classList.remove('active');
  init();
}

function updateStats() {
  document.getElementById('gen').textContent = gen;
  document.getElementById('alive').textContent = birds.filter(b=>b.alive).length;
  document.getElementById('pop').textContent = POP;
  document.getElementById('bestScore').textContent = bestScore;
  const avg = birds.length ? birds.reduce((s,b)=>s+b.score,0)/birds.length : 0;
  document.getElementById('avgScore').textContent = avg.toFixed(1);
  document.getElementById('diff').textContent = difficulty;
  document.getElementById('mut').textContent = (mutRate*100).toFixed(0)+'% s='+mutStr.toFixed(2);
}

function drawGraph() {
  gctx.fillStyle='#16213e'; gctx.fillRect(0,0,260,80);
  if (scoreHist.length < 2) return;
  const maxS = Math.max(...scoreHist.map(s=>s.score), 1);
  const toX = i => (i/(scoreHist.length-1))*260;
  const toY = v => 75 - (v/Math.max(maxS,1))*65;

  gctx.strokeStyle='#333'; gctx.lineWidth=0.5;
  for (let i=0;i<=4;i++) { gctx.beginPath(); gctx.moveTo(0,10+i*16); gctx.lineTo(260,10+i*16); gctx.stroke(); }

  gctx.strokeStyle='#7fff7f'; gctx.lineWidth=2; gctx.beginPath();
  for (let i=0;i<scoreHist.length;i++) {
    i===0 ? gctx.moveTo(toX(i),toY(scoreHist[i].score)) : gctx.lineTo(toX(i),toY(scoreHist[i].score));
  }
  gctx.stroke();

  gctx.fillStyle='#7fff7f'; gctx.font='9px monospace';
  gctx.fillText('best: '+bestScore, 4, 10);
}

function log(msg, type) {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = type||'';
  d.textContent = '[G'+gen+'] '+msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > 40) el.removeChild(el.firstChild);
}

function saveBestBrain() {
  if (!bestBrain) { log('No brain yet!','info'); return; }
  const data = { version:1, type:'flappy_ga_brain', inputSize:4, hiddenSize:3, outputSize:1,
    weights: bestBrain.w.slice(), generation:gen, bestScore:bestScore, difficulty:difficulty };
  const blob = new Blob([JSON.stringify(data)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='flappy_brain_g'+gen+'_s'+bestScore+'.json'; a.click();
  URL.revokeObjectURL(url);
  log('Saved! Score='+bestScore,'good');
}

init();
gameLoop();
</script>
</body>
</html>
