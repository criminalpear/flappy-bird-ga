<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird - Genetic Algorithm Trainer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', monospace; display: flex; flex-direction: column; align-items: center; padding: 10px; min-height: 100vh; }
h1 { font-size: 18px; margin-bottom: 6px; color: #f0e68c; }
#layout { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
canvas { border: 2px solid #444; border-radius: 4px; }
#panel { width: 280px; font-size: 12px; }
#panel h3 { color: #7fff7f; margin: 8px 0 4px; font-size: 13px; }
#stats { background: #16213e; padding: 8px; border-radius: 4px; line-height: 1.6; }
#stats span { color: #ffd700; }
#controls { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; }
button { background: #0f3460; color: #eee; border: 1px solid #444; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 11px; }
button:hover { background: #1a5276; }
button.active { background: #27ae60; }
#brainInfo { background: #16213e; padding: 8px; border-radius: 4px; margin-top: 6px; max-height: 200px; overflow-y: auto; font-size: 11px; }
#brainInfo pre { white-space: pre-wrap; word-break: break-all; }
#fitnessGraph { background: #16213e; border-radius: 4px; margin-top: 6px; }
#log { background: #0d1117; padding: 6px; border-radius: 4px; margin-top: 6px; max-height: 120px; overflow-y: auto; font-size: 10px; color: #888; }
#log .good { color: #7fff7f; }
#log .bad { color: #ff6b6b; }
#log .info { color: #7fbfff; }
</style>
</head>
<body>
<h1>🐦 Flappy Bird — Genetic Algorithm Trainer</h1>
<div id="layout">
  <canvas id="gameCanvas" width="400" height="600"></canvas>
  <div id="panel">
    <div id="controls">
      <button id="btnStart" onclick="toggleTraining()">▶ Start</button>
      <button id="btnSpeed" onclick="cycleSpeed()">Speed: 1x</button>
      <button onclick="saveBestBrain()">💾 Save Brain</button>
      <button onclick="loadBrainPrompt()">📂 Load Brain</button>
      <button onclick="resetTraining()">🔄 Reset</button>
      <button onclick="exportBrainJSON()">📋 Export JSON</button>
    </div>
    <h3>📊 Statistics</h3>
    <div id="stats">
      Generation: <span id="gen">0</span><br>
      Alive: <span id="alive">0</span> / <span id="pop">0</span><br>
      Best Fitness: <span id="bestFit">0</span><br>
      Best Score: <span id="bestScore">0</span><br>
      Avg Fitness: <span id="avgFit">0</span><br>
      Mutation Rate: <span id="mutRate">15%</span><br>
      Speed: <span id="speedDisp">1x</span>
    </div>
    <h3>📈 Fitness History</h3>
    <canvas id="fitnessGraph" width="280" height="100"></canvas>
    <h3>🧠 Best Brain Weights</h3>
    <div id="brainInfo"><em>Train to see brain data...</em></div>
    <h3>📜 Log</h3>
    <div id="log"></div>
  </div>
</div>
<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFileLoad(event)">

<script>
// ══════════════════════════════════════════════
//  NEURAL NETWORK
// ══════════════════════════════════════════════
class NeuralNetwork {
  constructor(inputSize, hiddenSize, outputSize) {
    this.inputSize = inputSize;
    this.hiddenSize = hiddenSize;
    this.outputSize = outputSize;
    // Xavier initialization
    const s1 = Math.sqrt(2.0 / (inputSize + hiddenSize));
    const s2 = Math.sqrt(2.0 / (hiddenSize + outputSize));
    this.weightsIH = [];
    for (let h = 0; h < hiddenSize; h++) {
      this.weightsIH[h] = [];
      for (let i = 0; i < inputSize; i++) {
        this.weightsIH[h][i] = (Math.random() - 0.5) * 2 * s1;
      }
    }
    this.weightsHO = [];
    for (let o = 0; o < outputSize; o++) {
      this.weightsHO[o] = [];
      for (let h = 0; h < hiddenSize; h++) {
        this.weightsHO[o][h] = (Math.random() - 0.5) * 2 * s2;
      }
    }
    this.biasH = new Array(hiddenSize).fill(0);
    this.biasO = new Array(outputSize).fill(0);
  }

  forward(inputs) {
    const hidden = new Array(this.hiddenSize);
    for (let h = 0; h < this.hiddenSize; h++) {
      let sum = this.biasH[h];
      for (let i = 0; i < this.inputSize; i++) {
        sum += inputs[i] * this.weightsIH[h][i];
      }
      hidden[h] = Math.max(0, sum); // ReLU
    }
    const output = new Array(this.outputSize);
    for (let o = 0; o < this.outputSize; o++) {
      let sum = this.biasO[o];
      for (let h = 0; h < this.hiddenSize; h++) {
        sum += hidden[h] * this.weightsHO[o][h];
      }
      // Sigmoid
      output[o] = 1.0 / (1.0 + Math.exp(-Math.max(-20, Math.min(20, sum))));
    }
    return output;
  }

  serialize() {
    const d = [];
    for (let row of this.weightsIH) d.push(...row);
    for (let row of this.weightsHO) d.push(...row);
    d.push(...this.biasH);
    d.push(...this.biasO);
    return d;
  }

  static deserialize(arr, iS, hS, oS) {
    const nn = new NeuralNetwork(0, 0, 0);
    nn.inputSize = iS; nn.hiddenSize = hS; nn.outputSize = oS;
    let idx = 0;
    nn.weightsIH = [];
    for (let h = 0; h < hS; h++) { nn.weightsIH[h] = arr.slice(idx, idx+iS); idx += iS; }
    nn.weightsHO = [];
    for (let o = 0; o < oS; o++) { nn.weightsHO[o] = arr.slice(idx, idx+hS); idx += hS; }
    nn.biasH = arr.slice(idx, idx+hS); idx += hS;
    nn.biasO = arr.slice(idx, idx+oS);
    return nn;
  }

  clone() {
    return NeuralNetwork.deserialize(this.serialize(), this.inputSize, this.hiddenSize, this.outputSize);
  }

  mutate(rate, strength) {
    const d = this.serialize();
    for (let i = 0; i < d.length; i++) {
      if (Math.random() < rate) {
        d[i] += (Math.random() - 0.5) * 2 * strength;
      }
    }
    return NeuralNetwork.deserialize(d, this.inputSize, this.hiddenSize, this.outputSize);
  }

  static crossover(a, b) {
    const dA = a.serialize();
    const dB = b.serialize();
    const alpha = Math.random();
    const child = [];
    for (let i = 0; i < dA.length; i++) {
      child.push(alpha * dA[i] + (1 - alpha) * dB[i]);
    }
    return NeuralNetwork.deserialize(child, a.inputSize, a.hiddenSize, a.outputSize);
  }
}

// ══════════════════════════════════════════════
//  GAME CONSTANTS
// ══════════════════════════════════════════════
const CW = 400, CH = 600;
const GRAVITY = 0.4;
const FLAP_VEL = -6.5;
const PIPE_W = 54;
const PIPE_GAP = 160;
const PIPE_SPEED = 2.5;
const PIPE_INTERVAL = 100;
const BIRD_R = 14;
const BIRD_X = 70;
const GROUND_Y = CH - 30;

// ══════════════════════════════════════════════
//  PIPE
// ══════════════════════════════════════════════
class Pipe {
  constructor(x, gapY) {
    this.x = x;
    this.gapY = gapY; // center of gap
    this.passed = false;
  }
  update() { this.x -= PIPE_SPEED; }
  draw(ctx) {
    const topH = this.gapY - PIPE_GAP/2;
    const botY = this.gapY + PIPE_GAP/2;
    // Top pipe
    ctx.fillStyle = '#27ae60';
    ctx.fillRect(this.x, 0, PIPE_W, topH);
    ctx.fillStyle = '#1e8449';
    ctx.fillRect(this.x - 3, topH - 18, PIPE_W + 6, 18);
    // Bottom pipe
    ctx.fillStyle = '#27ae60';
    ctx.fillRect(this.x, botY, PIPE_W, CH - botY);
    ctx.fillStyle = '#1e8449';
    ctx.fillRect(this.x - 3, botY, PIPE_W + 6, 18);
  }
  collides(bird) {
    const by = bird.y, br = BIRD_R;
    // Bird hitbox (slightly smaller)
    const m = 3;
    if (BIRD_X + m < this.x + PIPE_W && BIRD_X + br*2 - m > this.x) {
      const gapTop = this.gapY - PIPE_GAP/2;
      const gapBot = this.gapY + PIPE_GAP/2;
      if (by + m < gapTop || by + br*2 - m > gapBot) return true;
    }
    return false;
  }
}

// ══════════════════════════════════════════════
//  BIRD
// ══════════════════════════════════════════════
class Bird {
  constructor(brain) {
    this.y = CH * 0.35;
    this.vel = FLAP_VEL * 0.4;
    this.alive = true;
    this.score = 0;
    this.fitness = 0;
    this.framesAlive = 0;
    this.brain = brain || new NeuralNetwork(5, 8, 1);
  }

  think(pipes) {
    // Find next pipe ahead of bird
    let next = null;
    for (let p of pipes) {
      if (p.x + PIPE_W > BIRD_X) { next = p; break; }
    }
    if (!next) {
      // No pipe ahead — fly toward center
      const inputs = [
        this.y / CH,
        this.vel / 8,
        1.0, // far away
        0.5, // gap center
        0.5
      ];
      if (this.brain.forward(inputs)[0] > 0.5) this.flap();
      return;
    }
    const inputs = [
      this.y / CH,
      this.vel / 8,
      (next.x - BIRD_X) / CW,
      (next.gapY - PIPE_GAP/2) / CH,  // gap top
      (next.gapY + PIPE_GAP/2) / CH   // gap bottom
    ];
    if (this.brain.forward(inputs)[0] > 0.5) this.flap();
  }

  flap() { this.vel = FLAP_VEL; }

  update(pipes) {
    if (!this.alive) return;
    this.framesAlive++;
    this.vel += GRAVITY;
    this.y += this.vel;

    // Ground / ceiling
    if (this.y < 0) { this.y = 0; this.die(); return; }
    if (this.y + BIRD_R*2 > GROUND_Y) { this.die(); return; }

    // Pipe collision
    for (let p of pipes) {
      if (p.collides(this)) { this.die(); return; }
    }

    // Pass pipe
    for (let p of pipes) {
      if (!p.passed && p.x + PIPE_W < BIRD_X) {
        p.passed = true;
        this.score++;
        this.fitness += 100;
      }
    }

    // Per-frame fitness
    this.fitness += 0.5;
    // Reward being near gap center of next pipe
    let next = null;
    for (let p of pipes) { if (p.x + PIPE_W > BIRD_X) { next = p; break; } }
    if (next) {
      const birdCenter = this.y + BIRD_R;
      const dist = Math.abs(birdCenter - next.gapY);
      this.fitness += Math.max(0, 1.0 - dist / (PIPE_GAP * 0.5));
    }
  }

  die() {
    this.alive = false;
    this.fitness = Math.max(this.fitness, 1);
  }

  draw(ctx) {
    if (!this.alive) return;
    const cx = BIRD_X + BIRD_R;
    const cy = this.y + BIRD_R;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(Math.max(-0.4, Math.min(0.7, this.vel * 0.06)));
    // Body
    ctx.fillStyle = '#f0e68c';
    ctx.beginPath(); ctx.ellipse(0, 0, BIRD_R, BIRD_R*0.85, 0, 0, Math.PI*2); ctx.fill();
    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(4, -4, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(5, -4, 2, 0, Math.PI*2); ctx.fill();
    // Beak
    ctx.fillStyle = '#ff6b35';
    ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(15, 2); ctx.lineTo(8, 5); ctx.closePath(); ctx.fill();
    // Wing
    ctx.fillStyle = '#daa520';
    ctx.beginPath(); ctx.ellipse(-3, 3, 6, 3.5, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ══════════════════════════════════════════════
//  GA STATE
// ══════════════════════════════════════════════
const POP = 80;
const ELITE = 6;
const MUT_RATE = 0.15;
const MUT_STR = 0.4;

let birds = [], pipes = [], frameCount = 0;
let gen = 0, bestFit = 0, bestScore = 0, bestBrain = null;
let fitHistory = [], training = false, speed = 1;
let speeds = [1, 2, 5, 10, 50], speedIdx = 0;
let curMutRate = MUT_RATE;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const gCanvas = document.getElementById('fitnessGraph');
const gCtx = gCanvas.getContext('2d');

// ══════════════════════════════════════════════
//  GA FUNCTIONS
// ══════════════════════════════════════════════
function init() {
  birds = [];
  for (let i = 0; i < POP; i++) birds.push(new Bird());
  pipes = [];
  frameCount = 0;
  gen = 0; bestFit = 0; bestScore = 0; bestBrain = null;
  fitHistory = [];
  curMutRate = MUT_RATE;
  log('Ready! Press ▶ Start', 'info');
}

function nextGeneration() {
  gen++;
  for (let b of birds) if (b.alive) b.fitness = Math.max(b.fitness, 1);
  birds.sort((a, b) => b.fitness - a.fitness);

  const gb = birds[0];
  const avg = birds.reduce((s, b) => s + b.fitness, 0) / birds.length;

  if (gb.fitness > bestFit) {
    bestFit = gb.fitness;
    bestBrain = gb.brain.clone();
    log(`Gen ${gen}: best=${bestFit.toFixed(0)} score=${gb.score}`, 'good');
  }
  if (gb.score > bestScore) bestScore = gb.score;

  fitHistory.push({ gen: gen, best: gb.fitness, avg: avg });
  if (fitHistory.length > 200) fitHistory.shift();

  // Adaptive mutation
  if (gen > 3) {
    const r = fitHistory.slice(-3);
    if (r[2].best > r[0].best + 1) {
      curMutRate = Math.max(0.05, curMutRate * 0.9);
    } else {
      curMutRate = Math.min(0.4, curMutRate * 1.3);
    }
  }

  // Create new population
  const newBirds = [];
  // Elitism
  for (let i = 0; i < ELITE; i++) newBirds.push(new Bird(birds[i].brain.clone()));

  // Rank selection
  const ranks = birds.map((_, i) => POP - i);
  const totalR = ranks.reduce((a, b) => a + b, 0);
  function pick() {
    let r = Math.random() * totalR;
    for (let i = 0; i < POP; i++) { r -= ranks[i]; if (r <= 0) return birds[i]; }
    return birds[0];
  }

  while (newBirds.length < POP) {
    const a = pick();
    let b = pick();
    let t = 0;
    while (b === a && t++ < 10) b = pick();
    const child = NeuralNetwork.crossover(a.brain, b.brain);
    child.mutate(curMutRate, MUT_STR);
    newBirds.push(new Bird(child));
  }

  birds = newBirds;
  pipes = [];
  frameCount = 0;
  updateStats();
  drawGraph();
  updateBrainInfo();
}

// ══════════════════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════════════════
function gameLoop() {
  // Background
  const sky = ctx.createLinearGradient(0, 0, 0, CH);
  sky.addColorStop(0, '#4dc9f6'); sky.addColorStop(1, '#87ceeb');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, CW, CH);
  ctx.fillStyle = '#8B4513'; ctx.fillRect(0, GROUND_Y, CW, 30);
  ctx.fillStyle = '#228B22'; ctx.fillRect(0, GROUND_Y - 5, CW, 8);

  if (!training) {
    for (let b of birds) { ctx.globalAlpha = 0.6; b.draw(ctx); ctx.globalAlpha = 1; }
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, CW, 28);
    ctx.fillStyle = '#fff'; ctx.font = '12px monospace';
    ctx.fillText('Press ▶ Start | Pop: ' + POP, 8, 18);
    updateStats();
    requestAnimationFrame(gameLoop);
    return;
  }

  // Simulate
  for (let s = 0; s < speed; s++) {
    frameCount++;

    // Spawn pipes
    if (frameCount === 1) {
      // First pipe: close, centered
      pipes.push(new Pipe(CW * 0.5, CH * 0.4 + Math.random() * CH * 0.2));
    } else if ((frameCount - 1) % PIPE_INTERVAL === 0) {
      const gapY = 80 + Math.random() * (CH - PIPE_GAP - 160);
      pipes.push(new Pipe(CW + 10, gapY));
    }

    // Update pipes
    for (let p of pipes) p.update();
    pipes = pipes.filter(p => p.x + PIPE_W > -10);

    // Update birds
    let alive = 0;
    for (let b of birds) {
      if (b.alive) {
        b.think(pipes);
        b.update(pipes);
        if (b.alive) alive++;
      }
    }

    if (alive === 0) {
      nextGeneration();
    }
  }

  // Render
  for (let p of pipes) p.draw(ctx);
  for (let b of birds) b.draw(ctx);

  // Highlight best alive
  const best = birds.find(b => b.alive);
  if (best) {
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
    ctx.strokeRect(BIRD_X - 2, best.y - 2, BIRD_R*2 + 4, BIRD_R*2 + 4);
  }

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, CW, 28);
  ctx.fillStyle = '#fff'; ctx.font = '12px monospace';
  const alive = birds.filter(b => b.alive).length;
  ctx.fillText(`Gen: ${gen} | Alive: ${alive}/${POP} | Best: ${bestScore}`, 8, 18);

  updateStats();
  requestAnimationFrame(gameLoop);
}

// ══════════════════════════════════════════════
//  UI
// ══════════════════════════════════════════════
function toggleTraining() {
  training = !training;
  const btn = document.getElementById('btnStart');
  btn.textContent = training ? '⏸ Pause' : '▶ Start';
  btn.classList.toggle('active', training);
  if (birds.length === 0) init();
}

function cycleSpeed() {
  speedIdx = (speedIdx + 1) % speeds.length;
  speed = speeds[speedIdx];
  document.getElementById('btnSpeed').textContent = 'Speed: ' + speed + 'x';
  document.getElementById('speedDisp').textContent = speed + 'x';
}

function resetTraining() {
  training = false;
  document.getElementById('btnStart').textContent = '▶ Start';
  document.getElementById('btnStart').classList.remove('active');
  init();
}

function updateStats() {
  document.getElementById('gen').textContent = gen;
  document.getElementById('alive').textContent = birds.filter(b => b.alive).length;
  document.getElementById('pop').textContent = POP;
  document.getElementById('bestFit').textContent = bestFit.toFixed(0);
  document.getElementById('bestScore').textContent = bestScore;
  const avg = birds.length ? birds.reduce((s, b) => s + b.fitness, 0) / birds.length : 0;
  document.getElementById('avgFit').textContent = avg.toFixed(0);
  document.getElementById('mutRate').textContent = (curMutRate * 100).toFixed(0) + '%';
}

function drawGraph() {
  gCtx.fillStyle = '#16213e'; gCtx.fillRect(0, 0, 280, 100);
  if (fitHistory.length < 2) return;
  const maxF = Math.max(...fitHistory.map(f => f.best), 1);
  const minF = Math.min(...fitHistory.map(f => f.avg), 0);
  const range = maxF - minF || 1;
  const toX = i => (i / (fitHistory.length - 1)) * 280;
  const toY = v => 100 - ((v - minF) / range) * 90 - 5;

  gCtx.strokeStyle = '#7fff7f'; gCtx.lineWidth = 1.5; gCtx.beginPath();
  for (let i = 0; i < fitHistory.length; i++) {
    const x = toX(i), y = toY(fitHistory[i].best);
    i === 0 ? gCtx.moveTo(x, y) : gCtx.lineTo(x, y);
  }
  gCtx.stroke();

  gCtx.strokeStyle = '#7fbfff'; gCtx.lineWidth = 1; gCtx.beginPath();
  for (let i = 0; i < fitHistory.length; i++) {
    const x = toX(i), y = toY(fitHistory[i].avg);
    i === 0 ? gCtx.moveTo(x, y) : gCtx.lineTo(x, y);
  }
  gCtx.stroke();

  gCtx.fillStyle = '#7fff7f'; gCtx.fillRect(4, 4, 8, 3);
  gCtx.fillStyle = '#aaa'; gCtx.font = '9px monospace'; gCtx.fillText('best', 16, 8);
  gCtx.fillStyle = '#7fbfff'; gCtx.fillRect(50, 4, 8, 3);
  gCtx.fillStyle = '#aaa'; gCtx.fillText('avg', 62, 8);
}

function updateBrainInfo() {
  if (!bestBrain) return;
  const d = bestBrain.serialize();
  const p = d.slice(0, 15).map(v => v.toFixed(2)).join(', ');
  document.getElementById('brainInfo').innerHTML =
    `<pre>Net: 5→8→1 | Weights: ${d.length}\nBest 15: [${p}...]</pre>`;
}

function log(msg, type) {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = type || '';
  d.textContent = '[G' + gen + '] ' + msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > 50) el.removeChild(el.firstChild);
}

// ═══ SAVE / LOAD ═══
function saveBestBrain() {
  if (!bestBrain) { log('No brain yet!', 'bad'); return; }
  const data = {
    version: 1, type: 'flappy_ga_brain',
    inputSize: 5, hiddenSize: 8, outputSize: 1,
    weights: bestBrain.serialize(),
    generation: gen, bestFitness: bestFit, bestScore: bestScore,
    savedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'flappy_brain_g' + gen + '_s' + bestScore + '.json'; a.click();
  URL.revokeObjectURL(url);
  log('Saved! Gen ' + gen + ', Score ' + bestScore, 'good');
}

function loadBrainPrompt() { document.getElementById('fileInput').click(); }

function handleFileLoad(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.type !== 'flappy_ga_brain') { log('Invalid file!', 'bad'); return; }
      bestBrain = NeuralNetwork.deserialize(data.weights, 5, 8, 1);
      log('Loaded brain G' + data.generation + ' score=' + data.bestScore, 'good');
      for (let i = 0; i < birds.length; i++) {
        birds[i].brain = i < ELITE ? bestBrain.clone() : bestBrain.clone().mutate(curMutRate, MUT_STR);
      }
      updateBrainInfo();
    } catch (err) { log('Error: ' + err.message, 'bad'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function exportBrainJSON() {
  if (!bestBrain) { log('No brain!', 'bad'); return; }
  const data = {
    version: 1, type: 'flappy_ga_brain',
    inputSize: 5, hiddenSize: 8, outputSize: 1,
    weights: bestBrain.serialize(),
    generation: gen, bestFitness: bestFit, bestScore: bestScore
  };
  navigator.clipboard.writeText(JSON.stringify(data)).then(() => {
    log('Copied to clipboard!', 'good');
  });
}

// ═══ START ═══
init();
gameLoop();
</script>
